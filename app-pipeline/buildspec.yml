version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    IMAGE_REPO_NAME: simple-app
    IMAGE_TAG: latest
    EKS_CLUSTER_NAME: devops-pipeline-eks

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/$IMAGE_REPO_NAME
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - docker build -t $IMAGE_REPO_NAME ./app-pipeline/app
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - aws eks update-kubeconfig --region us-east-1 --name $EKS_CLUSTER_NAME
      - sed -i "s|IMAGE_URI|$REPOSITORY_URI:$IMAGE_TAG|g" app-pipeline/k8s/deployment.yml
      - kubectl apply -f app-pipeline/k8s/deployment.yml
      - kubectl apply -f app-pipeline/k8s/service.yml

artifacts:
  files:
    - '**/*'
